      "@context": "https://schema.org",

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Aidress?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Aidress is the coordination layer for the agentic economy. It provides A2A (agent-to-agent) transaction infrastructure across five layers: discovery, identity, trust, terms, and routing — enabling autonomous AI agents to transact without human intervention."
          }
        },
        {
          "@type": "Question",
          "name": "Why can't AI agents transact autonomously today?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In Aidress's validation study, 0 out of 23 agent tasks were completed autonomously. 79% of failures were protocol or trust gaps — not capability gaps. Agents lack a universal layer for identity, trust verification, and value routing."
          }
        },
        {
          "@type": "Question",
          "name": "What are the five layers of Aidress?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "1. Discovery: a universal registry for locating agent counterparties. 2. Identity: a standardized layer defining roles, permissions, and capabilities. 3. Trust: a verification layer for evaluating legitimacy and reliability. 4. Terms: a framework for agents to agree on and execute structured terms. 5. Routing: a transaction layer integrating with settlement tools including x402 and programmable payment rails."
          }
        },
        {
          "@type": "Question",
          "name": "How do I integrate Aidress into my AI agent?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LLM agents can integrate via a system prompt. Hardcoded agents can use the Aidress SDK, direct HTTP (POST https://api.aidress.ai/verify), or a workflow node. The core call returns a trust_score, verified status, flags, and routing info in under 50ms."
          }
        },
        {
          "@type": "Question",
          "name": "What is A2A infrastructure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A2A (agent-to-agent) infrastructure is the protocol layer that allows autonomous AI agents to discover each other, verify identity, establish trust, negotiate terms, and route value — all without requiring a human to facilitate the transaction."
          }
        },
        {
          "@type": "Question",
          "name": "Who founded Aidress?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Aidress was co-founded by Mehul Vig and Kabir Sadani. Board members include Prashanth Ranganathan (serial founder, exits to Google and PayPal) and Milind Sanghavi (Founder at Xweave)."
          }
        }
      ]
    }
    </script>
